# Quality checks - API compatibility, MSRV, security, coverage
name: Quality
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  # MSRV check - verify minimum supported Rust version
  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Check MSRV compatibility
        run: cargo check --workspace --all-features
  # Security and license audit
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-deny
      - name: Check advisories, licenses, and bans
        run: cargo deny check
  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
          # wasm32 needed by rustledger-importer's build.rs for the
          # wasm_importer_e2e fixture. Without it, the test detects the
          # missing sentinel and panics under CI=true. Same rationale
          # as the `ci` matrix in ci.yml.
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report
        run: |
          cargo llvm-cov --all-features --lcov --output-path lcov.info \
            --package rustledger-core \
            --package rustledger-parser \
            --package rustledger-booking \
            --package rustledger-loader \
            --package rustledger-validate \
            --package rustledger-query \
            --package rustledger-plugin \
            --package rustledger-importer \
            --package rustledger \
            --package rustledger-lsp
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  # Gate job - all quality checks must pass
  quality:
    name: quality
    if: always()
    needs: [msrv, deny, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Check all quality jobs
        run: |
          result="${{ (contains(needs.*.result, 'failure') && 'failure') || (contains(needs.*.result, 'cancelled') && 'cancelled') || 'success' }}"
          echo "Quality gate result: $result"
          [[ "$result" == "success" ]] || exit 1
