# Core CI workflow - runs on every PR
# Fast checks: format, build, lint, test, docs, regressions
#
# Optimization: Skips expensive builds on non-code PRs (docs, CI config, etc.)
# Always runs full build on: release PRs, pushes to main, merge queue
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
jobs:
  # Detect if code files changed (skip builds on docs-only PRs)
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - name: Check for code changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'tests/**'
              - 'spec/**'
      - name: Decide if build needed
        id: decide
        env:
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Always build on push to main, merge queue, or manual dispatch
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "Non-PR event ($EVENT_NAME) - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Always build on release PRs
          if [[ "$HEAD_REF" == release/* ]]; then
            echo "Release PR detected - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build if code changed
          if [[ "$CODE_CHANGED" == "true" ]]; then
            echo "Code changes detected - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No code changes - skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
  # Fast format check (only on code changes)
  fmt:
    name: Format
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check
  # ts-rs bindings freshness gate (#1218 Phase 1).
  # Regenerates `crates/rustledger-wasm/bindings/index.d.ts` from the
  # Rust DTOs and fails if it differs from the checked-in version. This
  # is the structural CI gate ADR-0004 was designed for: any wire-format
  # field change must come with a regenerated TS bundle in the same PR.
  ts-bindings-fresh:
    name: TypeScript bindings freshness
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      # sccache is set as RUSTC_WRAPPER at the workflow level (line 21),
      # so every job that compiles Rust must install the action -- without
      # it, cargo's `-vV` probe fails with "could not execute process
      # sccache" (E2 / ENOENT).
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: ts-bindings
      - name: Regenerate + diff TS bindings
        run: RUSTLEDGER_TS_CHECK=1 scripts/regen-ts-bindings.sh
  # Fast invariant check: verify that crates declaring
  # `#![forbid(unsafe_code)]` contain no `unsafe` blocks/items. Runs in
  # milliseconds via grep, so it fails loudly and early on AI-generated
  # PRs that try to add unsafe to a forbidding crate (see PR #769 for
  # the proximate trigger).
  #
  # `cargo check` also enforces this invariant, but its failure message
  # reads `"usage of an unsafe block"` without mentioning the forbid
  # directive the author is violating. This script prints both the
  # offending line and the forbid directive line in the same error, as
  # a named CI status, so reviewers don't have to hunt for context.
  unsafe-invariant:
    name: Unsafe Invariant
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - name: Verify forbid-unsafe-code invariant
        run: ./scripts/check-unsafe-invariant.sh

  # Plugin-test policies (Phase 5 of plugin-testing-quality plan, see #992).
  # Catches weak count assertions and `(partial)` test ports that tend to
  # silently mask plugin bugs.
  #
  # Always runs (no `should_build` gate), because the policy script and
  # CONTRIBUTING.md changes themselves can land in docs-only PRs and we
  # still want to lint the test files against the current policy.
  plugin-test-quality:
    name: Plugin Test Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - name: Self-test the lint script (catches regressions in the regexes)
        run: ./scripts/test-plugin-test-quality.sh
      - name: Run plugin-test-quality lints
        run: ./scripts/check-plugin-test-quality.sh
      - name: Self-test the per-plugin mutation report script
        run: ./scripts/test-per-plugin-mutation-report.sh

  # Main CI matrix - check, clippy, test, doc (only on code changes)
  ci:
    name: ${{ matrix.name }}
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Check
            cmd: cargo check --all-features --all-targets
            components: ""
          - name: Clippy
            cmd: cargo clippy --all-features --all-targets -- -D warnings
            components: clippy
          - name: Test
            cmd: cargo nextest run --all-features
            components: ""
            install: nextest
          - name: Documentation
            cmd: cargo doc --all-features --no-deps
            components: ""
            env: RUSTDOCFLAGS=-Dwarnings
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: ${{ matrix.components }}
          # wasm32 needed by rustledger-importer's build.rs (which
          # compiles the sample_stub fixture for the wasm_importer_e2e
          # test). Without it, build.rs gracefully skips and the e2e
          # test silently passes without doing anything — see PR #1135
          # commit history.
          targets: wasm32-unknown-unknown
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install nextest
        if: matrix.install == 'nextest'
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-nextest
        continue-on-error: true
        id: install-nextest
      - name: Install nextest (fallback)
        if: matrix.install == 'nextest' && steps.install-nextest.outcome == 'failure'
        run: cargo install cargo-nextest --locked
      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}
        env:
          RUSTDOCFLAGS: ${{ matrix.env == 'RUSTDOCFLAGS=-Dwarnings' && '-Dwarnings' || '' }}
  # Doctests (nextest doesn't support them, only on code changes)
  doctest:
    name: Doctests
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Run doctests
        run: cargo test --doc --all-features
  # Regression tests - user-reported issues (only on code changes)
  regressions:
    name: Regression Tests
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Build rledger
        run: cargo build --release --bin rledger
      - name: Run regression tests
        run: ./scripts/test-regressions.sh ./target/release/rledger
      - name: Summary
        run: |
          echo "## Regression Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested beancount files from user-reported issues:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in tests/regressions/issue-*.beancount; do
            issue=$(basename "$f" .beancount | sed 's/issue-//')
            echo "- [#$issue](https://github.com/rustledger/rustledger/issues/$issue)" >> $GITHUB_STEP_SUMMARY
          done
  # Gate job - all core checks must pass (or be skipped on non-code PRs)
  build:
    name: build
    if: always()
    runs-on: ubuntu-latest
    needs: [changes, fmt, unsafe-invariant, plugin-test-quality, ci, doctest, regressions]
    steps:
      - name: Check results
        run: |
          # plugin-test-quality always runs (no should_build gate), so its
          # result is always required.
          plugin_quality="${{ needs.plugin-test-quality.result }}"
          echo "plugin-test-quality result: $plugin_quality"
          if [[ "$plugin_quality" != "success" ]]; then
            echo "plugin-test-quality must pass"
            exit 1
          fi

          # If no code changes, the remaining build jobs are skipped - that's OK
          if [[ "${{ needs.changes.outputs.should_build }}" == "false" ]]; then
            echo "No code changes - build skipped (OK)"
            exit 0
          fi

          # Otherwise, check that all jobs passed
          results="${{ needs.fmt.result }} ${{ needs.unsafe-invariant.result }} ${{ needs.ci.result }} ${{ needs.doctest.result }} ${{ needs.regressions.result }}"
          echo "Job results: $results"

          if echo "$results" | grep -qE '(failure|cancelled)'; then
            echo "Some jobs failed or were cancelled"
            exit 1
          fi

          echo "All core checks passed!"
