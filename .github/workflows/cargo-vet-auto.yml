# Auto-update cargo-vet exemptions for Dependabot PRs and maintainer PRs
# that touch Cargo.lock. This prevents cargo-vet check failures when a
# dependency bump pulls in fresh transitive versions whose exemptions are
# pinned to the prior version.
name: Cargo Vet Auto
# SECURITY: Using pull_request_target to avoid untrusted checkout vulnerability (CodeQL alert #82).
# Trigger is gated to dependabot[bot] OR repo OWNER/MEMBER PRs. External
# contributors can't trigger this (which would let a hostile Cargo.lock
# add exemptions for a malicious crate). Repo maintainers already have
# write access, so allowing them adds no new attack surface compared to
# committing directly to the branch.
# The workflow only modifies supply-chain/ files. The PR's Cargo.lock is
# fetched explicitly after checking out the trusted base branch.
on:
  pull_request_target:
    paths:
      - 'Cargo.lock'
permissions:
  contents: read
jobs:
  update-exemptions:
    name: Update Exemptions
    runs-on: ubuntu-latest
    # Run for Dependabot PRs and trusted-maintainer PRs (OWNER/MEMBER).
    # Use author_association so we don't have to maintain a username list.
    # Skip when the actor is rustledger-bot itself — that would be this
    # workflow's own push, and re-triggering on it can cause an infinite
    # loop if the regen produces a no-op tree (see "Skip when nothing
    # actually changed" below for the structural fix).
    if: |
      github.actor != 'rustledger-bot[bot]' &&
      (
        github.actor == 'dependabot[bot]' ||
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER'
      )
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
      # SECURITY: Checkout base branch first (trusted code), then fetch only Cargo.lock from PR
      - name: Checkout base branch
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
        with:
          ref: ${{ github.base_ref }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Fetch PR's Cargo files
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # SECURITY: Pass via env vars to prevent potential shell injection
          REPO: ${{ github.repository }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Fetch Cargo.lock and any changed Cargo.toml files from the PR branch
          # This is needed because major version bumps update both files
          gh api "repos/$REPO/contents/Cargo.lock?ref=$PR_SHA" \
            --jq '.content' | base64 -d > Cargo.lock

          # Get list of changed files and fetch what `cargo metadata` needs:
          # Cargo.toml files for the new dep graph, PLUS the default target
          # file (src/lib.rs or src/main.rs) for any new workspace member.
          # Without the target file, cargo metadata refuses to load the new
          # crate's manifest ("no targets specified" or "rename file to
          # src/lib.rs"). Fetching the source file is safe: cargo metadata
          # parses Cargo.toml and resolves the dep graph but does NOT
          # compile or execute the source.
          # Using --paginate to handle PRs with many files, and while read to handle spaces in paths
          gh api --paginate "repos/$REPO/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename' | while IFS= read -r file; do
            if [[ "$file" == *"Cargo.toml" || "$file" == */src/lib.rs || "$file" == */src/main.rs ]]; then
              echo "Fetching $file from PR"
              # Ensure parent directory exists (might be new in the PR)
              mkdir -p "$(dirname "$file")"
              gh api "repos/$REPO/contents/$file?ref=$PR_SHA" \
                --jq '.content' | base64 -d > "$file"
            fi
          done
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - name: Install cargo-vet
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2
        with:
          tool: cargo-vet
      - name: Regenerate exemptions
        run: cargo vet regenerate exemptions
      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # SECURITY: Pass via env vars to prevent shell injection from branch names
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git add supply-chain/
          if git diff --staged --quiet; then
            echo "No exemption changes needed"
          else
            # Use GitHub API to create commits (signed by GitHub)
            # This is required because branch protection requires signed commits
            COMMIT_MSG="chore: regenerate cargo-vet exemptions"

            # Get the current commit SHA
            CURRENT_SHA=$(gh api "repos/$REPO/git/refs/heads/$BRANCH" --jq '.object.sha')
            echo "Current commit: $CURRENT_SHA"

            # Get the tree SHA from the current commit
            BASE_TREE=$(gh api "repos/$REPO/git/commits/$CURRENT_SHA" --jq '.tree.sha')
            echo "Base tree: $BASE_TREE"

            # Create blobs for all changed files in supply-chain/.
            # Pipe the JSON body through stdin (`--input -`) instead of `-f content="$CONTENT"`
            # so a large base64 blob can't blow past ARG_MAX and crash gh with E2BIG.
            TREE_ENTRIES="[]"
            for file in $(git diff --staged --name-only); do
              if [ -f "$file" ]; then
                BLOB_SHA=$(jq -n --rawfile content "$file" \
                  '{encoding: "base64", content: ($content | @base64)}' \
                  | gh api "repos/$REPO/git/blobs" --input - --jq '.sha')
                echo "Created blob for $file: $BLOB_SHA"
                TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --arg path "$file" --arg sha "$BLOB_SHA" \
                  '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
              fi
            done

            # Create new tree
            NEW_TREE=$(jq -n --argjson tree "$TREE_ENTRIES" --arg base "$BASE_TREE" \
              '{tree: $tree, base_tree: $base}' | \
              gh api "repos/$REPO/git/trees" --input - --jq '.sha')
            echo "New tree: $NEW_TREE"

            # Skip when nothing actually changed at the tree level.
            # This workflow checks out the BASE branch and regenerates
            # exemptions against the PR's Cargo.lock, which produces a
            # deterministic tree for a given lockfile. If the PR branch
            # already has that tree (because a previous run of this
            # workflow pushed it), `git diff --staged` may still see
            # local changes (working-tree-vs-base) but the resulting
            # tree is identical to the PR's current tree — which would
            # create an empty commit that loops via `pull_request_target`.
            if [ "$NEW_TREE" = "$BASE_TREE" ]; then
              echo "No effective changes (tree unchanged); skipping empty commit to avoid loop"
              exit 0
            fi

            # Create commit (GitHub will sign this)
            NEW_COMMIT=$(gh api "repos/$REPO/git/commits" \
              -f message="$COMMIT_MSG" \
              -f tree="$NEW_TREE" \
              -f "parents[]=$CURRENT_SHA" \
              --jq '.sha')
            echo "New commit: $NEW_COMMIT"

            # Update branch reference
            gh api "repos/$REPO/git/refs/heads/$BRANCH" \
              -X PATCH \
              -f sha="$NEW_COMMIT" \
              -F force=false

            echo "Exemptions updated (signed via GitHub API)"
          fi
